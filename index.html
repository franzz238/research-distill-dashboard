<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>研报天团 · 评价看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  :root { --bg:#0d1117; --card:#161b22; --border:#30363d; --text:#e6edf3; --muted:#8b949e; --accent:#58a6ff; --green:#3fb950; --red:#f85149; --orange:#d29922; --gold:#ffd700; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
  .container { max-width:1400px; margin:0 auto; padding:20px; }

  /* Header */
  .header { display:flex; align-items:center; gap:16px; padding:20px 0; border-bottom:1px solid var(--border); margin-bottom:24px; }
  .header h1 { font-size:24px; font-weight:700; }
  .header .badge { background:var(--accent); color:#fff; padding:2px 10px; border-radius:12px; font-size:12px; }
  .header .sub { color:var(--muted); font-size:14px; margin-left:auto; }

  /* Stats row */
  .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:24px; }
  .stat-card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:16px; }
  .stat-card .num { font-size:28px; font-weight:700; }
  .stat-card .label { font-size:13px; color:var(--muted); margin-top:4px; }
  .stat-card .num.gold { color:var(--gold); }
  .stat-card .num.blue { color:var(--accent); }
  .stat-card .num.green { color:var(--green); }

  /* Tabs */
  .tabs { display:flex; gap:4px; margin-bottom:20px; border-bottom:1px solid var(--border); }
  .tab { padding:10px 20px; cursor:pointer; color:var(--muted); font-size:14px; border-bottom:2px solid transparent; transition:all .2s; }
  .tab:hover { color:var(--text); }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .tab-content { display:none; }
  .tab-content.active { display:block; }

  /* Cards */
  .card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:20px; margin-bottom:16px; }
  .card h3 { font-size:16px; font-weight:600; margin-bottom:12px; }
  .chart-box { width:100%; height:400px; }

  /* Institution ranking */
  .rank-item { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
  .rank-item:last-child { border-bottom:none; }
  .rank-num { width:28px; height:28px; border-radius:50%; background:#1f2937; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; }
  .rank-num.gold { background:var(--gold); color:#000; }
  .rank-num.silver { background:#c0c0c0; color:#000; }
  .rank-num.bronze { background:#cd7f32; color:#fff; }
  .rank-info { flex:1; }
  .rank-info .name { font-weight:600; }
  .rank-info .detail { font-size:12px; color:var(--muted); }
  .rank-score { font-size:20px; font-weight:700; }
  .rank-bar { height:6px; background:#1f2937; border-radius:3px; margin-top:4px; }
  .rank-bar-fill { height:100%; border-radius:3px; transition:width .5s; }

  /* Prediction table */
  .pred-table { width:100%; border-collapse:collapse; font-size:13px; }
  .pred-table th { text-align:left; padding:8px 10px; color:var(--muted); border-bottom:1px solid var(--border); font-weight:500; cursor:pointer; white-space:nowrap; }
  .pred-table th:hover { color:var(--text); }
  .pred-table td { padding:8px 10px; border-bottom:1px solid var(--border); }
  .pred-table tr:hover { background:rgba(88,166,255,.05); }
  .tag { display:inline-block; padding:1px 8px; border-radius:10px; font-size:11px; font-weight:500; }
  .tag-ok { background:rgba(63,185,80,.15); color:var(--green); }
  .tag-fail { background:rgba(248,81,73,.15); color:var(--red); }
  .tag-pending { background:rgba(210,153,34,.15); color:var(--orange); }

  /* Framework diagram */
  .fw-layer { display:flex; align-items:stretch; gap:12px; margin-bottom:8px; }
  .fw-label { width:40px; background:var(--accent); color:#fff; border-radius:6px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0; }
  .fw-content { flex:1; background:#1f2937; border-radius:6px; padding:12px; }
  .fw-content .title { font-weight:600; margin-bottom:4px; }
  .fw-content .desc { font-size:12px; color:var(--muted); }
  .fw-arrow { text-align:center; color:var(--muted); font-size:18px; line-height:1; margin:0; }

  /* Filter bar */
  .filter-bar { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
  .filter-bar select, .filter-bar input { background:#1f2937; border:1px solid var(--border); color:var(--text); padding:6px 12px; border-radius:6px; font-size:13px; }
  .filter-bar select { min-width:120px; }

  /* Buttons */
  .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:6px; border:none; font-size:13px; cursor:pointer; font-weight:500; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { opacity:.85; }
  .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); }
  .btn-outline:hover { border-color:var(--accent); color:var(--accent); }
  .btn-group { display:flex; gap:8px; }

  /* Section header with actions */
  .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .section-header h3 { margin-bottom:0; }

  /* Prediction detail modal */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100; align-items:center; justify-content:center; }
  .modal-overlay.show { display:flex; }
  .modal { background:var(--card); border:1px solid var(--border); border-radius:12px; width:90%; max-width:560px; max-height:80vh; overflow:auto; padding:24px; }
  .modal h3 { margin-bottom:16px; }
  .modal .field { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); font-size:13px; }
  .modal .field .val { font-weight:500; text-align:right; max-width:60%; }
  .modal-close { float:right; background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; }
  .modal-close:hover { color:var(--text); }

  .mt-12 { margin-top:12px; }
  .text-muted { color:var(--muted); }
  .text-center { text-align:center; }

  .row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media(max-width:900px){ .row { grid-template-columns:1fr; } }
</style>
</head>
<body>

<div class="container" id="app">

  <!-- Header -->
  <div class="header">
    <h1>📊 研报天团 · 评价看板</h1>
    <span class="badge">MVP v0.2</span>
    <span class="sub">机构 skill 蒸馏 · 预测评分 · 可溯源</span>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="statsRow"></div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="overview">全景概览</div>
    <div class="tab" data-tab="predictions">预测评分</div>
    <div class="tab" data-tab="market">行情走势</div>
    <div class="tab" data-tab="framework">中信框架</div>
  </div>

  <!-- Tab: Overview -->
  <div class="tab-content active" id="tab-overview">
    <div class="row">
      <div class="card">
        <h3>🏆 机构排名</h3>
        <div id="rankingList"></div>
      </div>
      <div class="card">
        <h3>📈 10Y 国债收益率走势</h3>
        <div class="chart-box" id="overviewChart"></div>
      </div>
    </div>
    <div class="card">
      <h3>🎯 评分分布</h3>
      <div class="chart-box" id="scoreDistChart"></div>
    </div>
  </div>

  <!-- Tab: Predictions -->
  <div class="tab-content" id="tab-predictions">
    <div class="card">
      <div class="section-header">
        <h3>📋 预测评分明细</h3>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="exportCSV()">⬇ 导出 CSV</button>
          <button class="btn btn-outline" onclick="exportJSON()">⬇ 导出 JSON</button>
        </div>
      </div>
      <div class="filter-bar">
        <select id="filterInst" onchange="renderPredictions()"><option value="">全部机构</option></select>
        <select id="filterResult" onchange="renderPredictions()"><option value="">全部结果</option><option value="hit">方向命中</option><option value="miss">方向未中</option></select>
        <input type="text" id="filterSearch" placeholder="搜索预测标的..." oninput="renderPredictions()" style="flex:1;min-width:120px;">
      </div>
      <div style="overflow-x:auto">
        <table class="pred-table" id="predTable">
          <thead>
            <tr><th data-sort="score" onclick="sortPreds('score')">综合分 ▾</th><th data-sort="date" onclick="sortPreds('date')">日期</th><th data-sort="inst" onclick="sortPreds('inst')">机构</th><th data-sort="target" onclick="sortPreds('target')">预测标的</th><th data-sort="horizon" onclick="sortPreds('horizon')">时间窗</th><th data-sort="dirScore" onclick="sortPreds('dirScore')">方向</th><th>幅度误差</th><th>区间</th><th></th></tr>
          </thead>
          <tbody id="predBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Tab: Market -->
  <div class="tab-content" id="tab-market">
    <div class="card">
      <div class="section-header">
        <h3>📊 利率债收益率曲线</h3>
        <button class="btn btn-outline" onclick="exportChartData()">⬇ 导出数据</button>
      </div>
      <div class="chart-box" id="marketChart"></div>
    </div>
  </div>

  <!-- Tab: Framework -->
  <div class="tab-content" id="tab-framework">
    <div class="card">
      <h3>🏛️ 中信证券 · 利率策略分析框架</h3>
      <p class="text-muted" style="margin-bottom:16px">蒸馏自2026年利率债策略报告 · 评分验证 76/100</p>
      <div id="frameworkDiagram"></div>
    </div>
    <div class="card">
      <h3>📜 中信证券 2026 预测一览</h3>
      <div id="citicPredList"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h3 id="modalTitle">预测详情</h3>
    <div id="modalBody"></div>
  </div>
</div>

  const max = Math.max(...DATA.rankings.map(r=>r.avgScore));
  el.innerHTML = DATA.rankings.map((r,i) => {
    const medal = ['gold','silver','bronze'][i]||'';
    const fill = r.avgScore / max * 100;
    const colors = ['#ffd700','#c0c0c0','#cd7f32','#58a6ff','#8b949e'];
    const color = colors[i]||colors[4];
    return `<div class="rank-item">
      <div class="rank-num ${medal}">${i+1}</div>
      <div class="rank-info">
        <div class="name">${r.name}</div>
        <div class="detail">${r.count} 条预测</div>
        <div class="rank-bar"><div class="rank-bar-fill" style="width:${fill}%;background:${color}"></div></div>
      </div>
      <div class="rank-score" style="color:${color}">${r.avgScore}</div>
    </div>`;
  }).join('');
}

// ── Overview Chart (10Y + 30Y) ──

// ── Score Distribution ──
let scoreDistChart;
function renderScoreDist() {
  const el = document.getElementById('scoreDistChart');
  scoreDistChart = echarts.init(el);
  const bins = [0,20,40,60,80,100];
  const counts = bins.map((b,i)=>DATA.predictions.filter(p=>p.score>=b && (i===bins.length-1 || p.score<bins[i+1])).length);
  scoreDistChart.setOption({
    tooltip:{trigger:'axis'},
    grid:{top:10,right:20,bottom:30,left:40},
    xAxis:{type:'category',data:['0-20','20-40','40-60','60-80','80-100'],axisLabel:{color:'#8b949e'}},
    yAxis:{type:'value',splitLine:{lineStyle:{color:'#21262d'}}},
    series:[{type:'bar',data:counts,itemStyle:{color:{type:'linear',x:0,y:0,x:1,y:0,colorStops:[{offset:0,color:'#f85149'},{offset:.5,color:'#d29922'},{offset:1,color:'#3fb950'}]}},barWidth:'60%'}]
  });
}

// ── Predictions Table ──
let predSortKey='score',predSortDir=-1;
function sortPreds(k) {
  if(predSortKey===k) predSortDir*=-1; else { predSortKey=k; predSortDir=-1; }
  renderPredictions();
  document.querySelectorAll('.pred-table th').forEach(th=>th.textContent=th.textContent.replace(/[▾▴]/g,'').trim());
  const arrow = predSortDir===-1?'▾':'▴';
  const th = document.querySelector(`.pred-table th[data-sort="${k}"]`);
  if(th) th.textContent = th.textContent + ' ' + arrow;
}
function renderPredictions() {
  const fi = document.getElementById('filterInst').value;
  const fr = document.getElementById('filterResult').value;
  const fs = document.getElementById('filterSearch').value.toLowerCase();
  let list = DATA.predictions.filter(p => {
    if(fi && p.inst!==fi) return false;
    if(fr==='hit' && !p.dirHit) return false;
    if(fr==='miss' && p.dirHit!==false) return false;
    if(fs && !p.target.toLowerCase().includes(fs) && !p.inst.toLowerCase().includes(fs)) return false;
    return true;
  });
  list.sort((a,b)=>predSortDir*(a[predSortKey]<b[predSortKey]?-1:1));
  const body = document.getElementById('predBody');
  body.innerHTML = list.map(p => {
    const dirTag = p.dirHit===true?'<span class="tag tag-ok">命中</span>':p.dirHit===false?'<span class="tag tag-fail">未中</span>':'<span class="tag tag-pending">待验</span>';
    const rangeTag = p.rangeHit===true?'<span class="tag tag-ok">命中</span>':p.rangeHit===false?'<span class="tag tag-fail">未中</span>':'-';
    const err = p.magErr!==null?p.magErr+'bp':'-';
    return `<tr onclick="showDetail('${p.id}')" style="cursor:pointer">
      <td><strong>${p.score}</strong></td>
      <td>${p.date}</td>
      <td>${p.inst}</td>
      <td>${p.target}</td>
      <td>${p.horizon}</td>
      <td>${dirTag}</td>
      <td>${err}</td>
      <td>${rangeTag}</td>
      <td>→</td>
    </tr>`;
  }).join('');
  // Populate filter
  const sel = document.getElementById('filterInst');
  const insts = [...new Set(DATA.predictions.map(p=>p.inst))];
  sel.innerHTML = '<option value="">全部机构</option>'+insts.map(i=>`<option value="${i}"${i===fi?' selected':''}>${i}</option>`).join('');
}
function showDetail(id) {
  const p = DATA.predictions.find(x=>x.id===id);
  if(!p) return;
  document.getElementById('modalTitle').textContent = p.target + ' · ' + p.inst;
  document.getElementById('modalBody').innerHTML = `
    <div class="field"><span>评分</span><span class="val">${p.score}/100</span></div>
    <div class="field"><span>预测方向</span><span class="val">${p.predDir}</span></div>
    <div class="field"><span>实际方向</span><span class="val">${p.actDir||'-'}</span></div>
    <div class="field"><span>方向命中</span><span class="val">${p.dirHit===true?'✅ 是':p.dirHit===false?'❌ 否':'⏳ 待验证'}</span></div>
    <div class="field"><span>起始值</span><span class="val">${p.startVal!==null?p.startVal+'%':'-'}</span></div>
    <div class="field"><span>结束值</span><span class="val">${p.endVal!==null?p.endVal+'%':'-'}</span></div>
    ${p.magErr!==null?`<div class="field"><span>幅度误差</span><span class="val">${p.magErr}bp</span></div>`:''}
    ${p.rangeHit!==null?`<div class="field"><span>区间命中</span><span class="val">${p.rangeHit?'✅ 是':'❌ 否'}</span></div>`:''}
    <div class="field"><span>时间窗口</span><span class="val">${p.horizon}</span></div>
    <div class="field"><span>机构</span><span class="val">${p.inst}</span></div>
  `;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(e) { if(!e || e.target===document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('show'); }

// ── Framework Diagram ──
function renderFramework() {
  const layers = [
    {title:'宏观基本面',desc:'内需弱+外需高景气 → 结构性复苏 · 经济增速波动性小',items:'GDP增速、社融、出口、CPI、PPI'},
    {title:'货币政策取向',desc:'OMO 7D 1.40% 为锚 + 利差中枢 50bp → 10Y中性利率 1.90%',items:'降准降息节奏、MLF、央行国债操作'},
    {title:'资金面与机构行为',desc:'存款搬家链条：出口结汇→存款活化→银行配置→利率顶部约束',items:'DR001/DR007、基金久期、配置盘力度'},
    {title:'供给与技术面',desc:'政府债发行节奏 + 技术面信号（换手率/股债比价）',items:'超长债供给、30Y换手率、股债性价比'},
    {title:'策略输出',desc:'利率区间 + 久期建议 + 品种选择',items:'目标区间1.7-1.9%、哑铃型/均衡型结构'},
  ];
  document.getElementById('frameworkDiagram').innerHTML = layers.map((l,i) => `
    <div class="fw-layer">
      <div class="fw-label">L${i+1}</div>
      <div class="fw-content">
        <div class="title">${l.title}</div>
        <div class="desc">${l.desc}</div>
        <div class="desc" style="color:var(--accent);font-size:11px;margin-top:4px">${l.items}</div>
      </div>
    </div>
    ${i<layers.length-1?'<div class="fw-arrow">↓</div>':''}
  `).join('');
}

// ── CITIC Predictions ──
function renderCiticPreds() {
  document.getElementById('citicPredList').innerHTML = DATA.citicSummary.map(p => {
    const rng = p.rangeLow!==null?` <span style="color:var(--accent)">[${p.rangeLow}-${p.rangeHigh}%]</span>`:'';
    const clr = p.confidence==='high'?'var(--green)':p.confidence==='medium'?'var(--orange)':'var(--muted)';
    return `<div style="padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:600">${p.date}</span>
        <span class="tag" style="background:${clr}22;color:${clr}">${p.confidence}</span>
      </div>
      <div style="margin-top:4px;font-size:14px">${p.target}: ${p.direction}${rng}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px">"${p.rawText}"</div>
    </div>`;
  }).join('');
}

// ── Export ──
function exportCSV() {
  const rows = [['机构','预测标的','时间窗','综合分','方向命中','幅度误差bp','区间命中','起始值%','结束值%']];
  DATA.predictions.forEach(p => rows.push([p.inst,p.target,p.horizon,p.score,p.dirHit?'是':'否',p.magErr!==null?p.magErr:'',p.rangeHit?'是':'-',p.startVal!==null?p.startVal:'',p.endVal!==null?p.endVal:'']));
  downloadCSV(rows,'研报天团_评分数据.csv');
}
function exportJSON() {
  const blob = new Blob([JSON.stringify(DATA.predictions,null,2)],{type:'application/json'});
  downloadBlob(blob,'研报天团_评分数据.json');
}
function exportChartData() {
  const rows = [['日期','10Y国债%','30Y国债%','OMO 7D%','CDB 10Y%']];
  DATA.timeSeries.forEach(d => rows.push([d.d,d.t10,d.t30||'',d.omo||'',d.cdb10||'']));
  downloadCSV(rows,'研报天团_行情数据.csv');
}
function downloadCSV(rows,name) {
  const csv = rows.map(r=>r.map(v=>typeof v==='string'&&v.includes(',')?'"'+v+'"':v).join(',')).join('\n');
  downloadBlob(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'}),name);
}
function downloadBlob(blob,name) {
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); URL.revokeObjectURL(a.href);
}
