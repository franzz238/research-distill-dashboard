<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>研报天团 · 评价看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="data_compact.js"></script>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--red:#f85149;--orange:#d29922;--gold:#ffd700}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.container{max-width:1400px;margin:0 auto;padding:20px}
.header{display:flex;align-items:center;padding:20px 0;border-bottom:1px solid var(--border);margin-bottom:24px}
.header h1{font-size:22px}.header .badge{background:var(--accent);color:#fff;padding:2px 10px;border-radius:12px;font-size:12px;margin-left:10px}
.header .sub{color:var(--muted);font-size:13px;margin-left:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px}
.stat-card .num{font-size:28px;font-weight:700}
.stat-card .label{font-size:12px;color:var(--muted);margin-top:2px}
.tabs{display:flex;gap:2px;margin-bottom:16px;border-bottom:1px solid var(--border)}
.tab{padding:10px 20px;cursor:pointer;color:var(--muted);font-size:14px;border-bottom:2px solid transparent}
.tab:hover{color:var(--text)}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.page{display:none}.page.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px}
.card h3{font-size:15px;font-weight:600;margin-bottom:12px}
.chart-box{width:100%;height:380px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:900px){.row{grid-template-columns:1fr}}
.rank-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.rank-item:last-child{border-bottom:none}
.rank-num{width:28px;height:28px;border-radius:50%;background:#1f2937;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.rank-info{flex:1}.rank-info .name{font-weight:600}.rank-info .detail{font-size:12px;color:var(--muted)}
.rank-score{font-size:20px;font-weight:700}
.rank-bar{height:6px;background:#1f2937;border-radius:3px;margin-top:4px}
.rank-bar-fill{height:100%;border-radius:3px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;color:var(--muted);border-bottom:1px solid var(--border);font-weight:500;cursor:pointer;white-space:nowrap}
th:hover{color:var(--text)}
td{padding:8px 10px;border-bottom:1px solid var(--border)}
tr:hover{background:rgba(88,166,255,.05);cursor:pointer}
.tag{display:inline-block;padding:1px 8px;border-radius:10px;font-size:11px}
.tag-yes{background:rgba(63,185,80,.15);color:var(--green)}
.tag-no{background:rgba(248,81,73,.15);color:var(--red)}
.tag-na{background:rgba(139,148,158,.15);color:var(--muted)}
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-bar select,.filter-bar input{background:#1f2937;border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:13px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;border:none;font-size:13px;cursor:pointer;font-weight:500}
.btn-primary{background:var(--accent);color:#fff}.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-header h3{margin-bottom:0}
.fw-layer{display:flex;align-items:stretch;gap:10px;margin-bottom:6px}
.fw-label{width:36px;background:var(--accent);color:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.fw-content{flex:1;background:#1f2937;border-radius:6px;padding:10px 14px}
.fw-content .t{font-weight:600;font-size:14px}
.fw-content .d{font-size:12px;color:var(--muted)}
.fw-arrow{text-align:center;color:var(--muted);font-size:14px;line-height:1;margin:2px 0}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:12px;width:90%;max-width:500px;max-height:75vh;overflow:auto;padding:24px}
.modal-box h3{margin-bottom:16px}
.modal-close{float:right;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer}
.modal-close:hover{color:var(--text)}
.mf{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.mf .v{font-weight:500;text-align:right}
.pred-item{padding:8px 0;border-bottom:1px solid var(--border)}
.pred-item:last-child{border-bottom:none}
.pred-item .pd{font-size:12px;color:var(--muted)}
</style>
</head>
<body><div class="container" id="app">

<div class="header">
  <h1>研报天团 · 评价看板</h1>
  <span class="badge">MVP</span>
  <span class="sub">机构 Skill 蒸馏 · 预测评分 · 可溯源</span>
</div>

<div class="grid" id="statsBar"></div>

<div class="tabs">
  <div class="tab active" data-tab="overview" onclick="switchTab('overview')">全景概览</div>
  <div class="tab" data-tab="preds" onclick="switchTab('preds')">预测评分</div>
  <div class="tab" data-tab="market" onclick="switchTab('market')">行情走势</div>
  <div class="tab" data-tab="framework" onclick="switchTab('framework')">中信框架</div>
</div>

<div class="page active" id="page-overview">
  <div class="row">
    <div class="card"><h3>机构排名</h3><div id="rankList"></div></div>
    <div class="card"><h3>10Y 国债收益率走势</h3><div class="chart-box" id="chartOverview"></div></div>
  </div>
  <div class="card"><h3>评分分布</h3><div class="chart-box" id="chartDist"></div></div>
</div>

<div class="page" id="page-preds">
  <div class="card">
    <div class="section-header">
      <h3>预测评分明细</h3>
      <div>
        <button class="btn btn-outline" onclick="exportCSV()">CSV</button>
        <button class="btn btn-outline" onclick="exportJSON()">JSON</button>
      </div>
    </div>
    <div class="filter-bar">
      <select id="fInst" onchange="renderTable()"></select>
      <select id="fHit" onchange="renderTable()"><option value="">全部结果</option><option value="hit">方向命中</option><option value="miss">方向未中</option></select>
      <input id="fSearch" placeholder="搜索..." oninput="renderTable()" style="flex:1;min-width:100px">
    </div>
    <div style="overflow-x:auto"><table><thead><tr>
      <th onclick="sortBy('score')" id="sh-score">综合分</th>
      <th onclick="sortBy('date')" id="sh-date">日期</th>
      <th onclick="sortBy('inst')" id="sh-inst">机构</th>
      <th onclick="sortBy('target')" id="sh-target">标的</th>
      <th onclick="sortBy('horizon')" id="sh-horizon">时间窗</th>
      <th onclick="sortBy('dirScore')" id="sh-dir">方向</th>
      <th>幅度误差</th>
      <th>区间</th>
    </tr></thead><tbody id="predBody"></tbody></table></div>
  </div>
</div>

<div class="page" id="page-market">
  <div class="card">
    <div class="section-header"><h3>利率债收益率曲线</h3><button class="btn btn-outline" onclick="exportMarketCSV()">导出数据</button></div>
    <div class="chart-box" id="chartMarket"></div>
  </div>
</div>

<div class="page" id="page-framework">
  <div class="card">
    <h3>中信证券 · 五层推导体系</h3>
    <p style="color:var(--muted);font-size:13px;margin-bottom:16px">蒸馏自 2026 年利率债策略报告 · 评分验证 76/100</p>
    <div id="frameworkContent"></div>
  </div>
  <div class="card">
    <h3>中信证券 2026 预测一览</h3>
    <div id="citicPreds"></div>
  </div>
</div>

<div class="modal" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
  </div>
</div>

</div>

<script>
var D = _D, sortK = 'score', sortD = -1;

function switchTab(t) {
  document.querySelectorAll('.tab, .page').forEach(e => e.classList.remove('active'));
  document.querySelector('[data-tab="'+t+'"]').classList.add('active');
  document.getElementById('page-'+t).classList.add('active');
  setTimeout(() => { [c1,c2,c3].forEach(c => c&&c.resize&&c.resize()); }, 100);
}

// Stats
function renderStats() {
  var s = D.st;
  document.getElementById('statsBar').innerHTML = [
    ['评分预测', s.scoredPredictions+'/'+s.totalPredictions, 'var(--accent)'],
    ['机构数', s.institutionCount, 'var(--green)'],
    ['平均分', s.avgScore, 'var(--gold)'],
    ['研报数', s.totalReports, 'var(--accent)'],
    ['交易日', s.tradingDays, ''],
  ].map(x => '<div class="stat-card"><div class="num" style="color:'+x[2]+'">'+x[1]+'</div><div class="label">'+x[0]+'</div></div>').join('');
}

// Ranking
function renderRank() {
  var max = Math.max(...D.rk.map(r => r.avgScore));
  var med = ['gold','silver','bronze'];
  var cols = ['#ffd700','#c0c0c0','#cd7f32','#58a6ff','#8b949e'];
  document.getElementById('rankList').innerHTML = D.rk.map(function(r,i){
    var pct = r.avgScore/max*100;
    return '<div class="rank-item"><div class="rank-num'+(med[i]?' '+med[i]:'')+'">'+(i+1)+'</div>'+
      '<div class="rank-info"><div class="name">'+r.name+'</div><div class="detail">'+r.count+' 条预测</div>'+
      '<div class="rank-bar"><div class="rank-bar-fill" style="width:'+pct+'%;background:'+(cols[i]||cols[4])+'"></div></div></div>'+
      '<div class="rank-score" style="color:'+(cols[i]||cols[4])+'">'+r.avgScore+'</div></div>';
  }).join('');
}

// Overview chart
var c1;
function renderChart1() {
  c1 = echarts.init(document.getElementById('chartOverview'));
  var dates = D.ts.map(function(d){return d.d;});
  c1.setOption({
    tooltip:{trigger:'axis',valueFormatter:function(v){return v+'%'}},
    legend:{data:['10Y国债','30Y国债'],textStyle:{color:'#8b949e'},bottom:0},
    grid:{top:10,right:20,bottom:40,left:40},
    xAxis:{type:'category',data:dates,axisLabel:{fontSize:10,color:'#8b949e'}},
    yAxis:{type:'value',axisLabel:{formatter:'{value}%',fontSize:10,color:'#8b949e'},splitLine:{lineStyle:{color:'#21262d'}}},
    series:[
      {name:'10Y国债',type:'line',data:D.ts.map(function(d){return d.t10;}),smooth:true,lineStyle:{width:2,color:'#58a6ff'}},
      {name:'30Y国债',type:'line',data:D.ts.map(function(d){return d.t30;}),smooth:true,lineStyle:{width:2,color:'#d29922'}}
    ]
  });
}

// Score distribution
var c2;
function renderChart2() {
  c2 = echarts.init(document.getElementById('chartDist'));
  var bins = [0,20,40,60,80,100], counts = [0,0,0,0,0];
  D.pr.forEach(function(p){
    var i = Math.min(Math.floor(p.score/20),4);
    counts[i]++;
  });
  c2.setOption({
    tooltip:{trigger:'axis'},grid:{top:10,right:20,bottom:30,left:40},
    xAxis:{type:'category',data:['0-20','20-40','40-60','60-80','80-100'],axisLabel:{color:'#8b949e'}},
    yAxis:{type:'value',splitLine:{lineStyle:{color:'#21262d'}}},
    series:[{type:'bar',data:counts,itemStyle:{color:{type:'linear',x:0,y:0,x:1,y:0,colorStops:[{offset:0,color:'#f85149'},{offset:.5,color:'#d29922'},{offset:1,color:'#3fb950'}]}},barWidth:'60%'}]
  });
}

// Market chart
var c3;
function renderChart3() {
  c3 = echarts.init(document.getElementById('chartMarket'));
  var dates = D.ts.map(function(d){return d.d;});
  c3.setOption({
    tooltip:{trigger:'axis',valueFormatter:function(v){return v+'%'}},
    legend:{data:['10Y国债','30Y国债','OMO 7D','CDB 10Y'],textStyle:{color:'#8b949e'},bottom:0},
    grid:{top:10,right:20,bottom:40,left:40},
    xAxis:{type:'category',data:dates,axisLabel:{fontSize:10,color:'#8b949e'}},
    yAxis:{type:'value',axisLabel:{formatter:'{value}%',fontSize:10,color:'#8b949e'},splitLine:{lineStyle:{color:'#21262d'}}},
    series:[
      {name:'10Y国债',type:'line',data:D.ts.map(function(d){return d.t10;}),smooth:true,lineStyle:{width:2,color:'#58a6ff'}},
      {name:'30Y国债',type:'line',data:D.ts.map(function(d){return d.t30;}),smooth:true,lineStyle:{width:2,color:'#d29922'}},
      {name:'OMO 7D',type:'line',data:D.ts.map(function(d){return d.omo;}),step:'end',lineStyle:{width:1,color:'#3fb950',type:'dashed'}},
      {name:'CDB 10Y',type:'line',data:D.ts.map(function(d){return d.cdb10;}),smooth:true,lineStyle:{width:1,color:'#f0883e'}}
    ]
  });
}

// Prediction table
function sortBy(k) {
  if (sortK === k) sortD *= -1; else { sortK = k; sortD = -1; }
  renderTable();
  document.querySelectorAll('#page-preds th').forEach(function(t){t.style.color='';});
  var el = document.getElementById('sh-'+k);
  if (el) el.style.color = 'var(--accent)';
}

function renderTable() {
  var fi = document.getElementById('fInst').value;
  var fh = document.getElementById('fHit').value;
  var fs = document.getElementById('fSearch').value.toLowerCase();
  var list = D.pr.filter(function(p){
    if (fi && p.inst !== fi) return false;
    if (fh === 'hit' && !p.dirHit) return false;
    if (fh === 'miss' && p.dirHit !== false) return false;
    if (fs && p.target.toLowerCase().indexOf(fs) < 0 && p.inst.toLowerCase().indexOf(fs) < 0) return false;
    return true;
  });
  list.sort(function(a,b){
    var va = a[sortK], vb = b[sortK];
    if (va == null) va = -999; if (vb == null) vb = -999;
    if (va < vb) return sortD; if (va > vb) return -sortD;
    return 0;
  });
  document.getElementById('predBody').innerHTML = list.map(function(p){
    var dt = p.dirHit === true ? '<span class="tag tag-yes">命中</span>' :
             p.dirHit === false ? '<span class="tag tag-no">未中</span>' : '<span class="tag tag-na">待验</span>';
    var rt = p.rangeHit === true ? '<span class="tag tag-yes">命中</span>' :
             p.rangeHit === false ? '<span class="tag tag-no">未中</span>' : '-';
    var err = p.magErr != null ? p.magErr + 'bp' : '-';
    return '<tr onclick="showDetail(\''+p.id+'\')"><td><strong>'+p.score+'</strong></td><td>'+p.date+'</td><td>'+p.inst+'</td><td>'+p.target+'</td><td>'+p.horizon+'</td><td>'+dt+'</td><td>'+err+'</td><td>'+rt+'</td></tr>';
  }).join('');
  // populate filter
  var sel = document.getElementById('fInst');
  var cur = sel.value;
  var insts = [], seen = {};
  D.pr.forEach(function(p){if(!seen[p.inst]){seen[p.inst]=1;insts.push(p.inst);}});
  sel.innerHTML = '<option value="">全部机构</option>' + insts.map(function(i){return '<option value="'+i+'"'+(i===cur?' selected':'')+'>'+i+'</option>';}).join('');
}

// Detail modal
function showDetail(id) {
  var p = D.pr.filter(function(x){return x.id===id;})[0];
  if (!p) return;
  document.getElementById('modalTitle').textContent = p.target + ' · ' + p.inst;
  document.getElementById('modalBody').innerHTML =
    '<div class="mf"><span>评分</span><span class="v">'+p.score+'/100</span></div>'+
    '<div class="mf"><span>预测方向</span><span class="v">'+(p.predDir||'-')+'</span></div>'+
    '<div class="mf"><span>实际方向</span><span class="v">'+(p.actDir||'-')+'</span></div>'+
    '<div class="mf"><span>方向命中</span><span class="v">'+(p.dirHit===true?'是':p.dirHit===false?'否':'待验证')+'</span></div>'+
    '<div class="mf"><span>起始值</span><span class="v">'+(p.startVal!=null?p.startVal+'%':'-')+'</span></div>'+
    '<div class="mf"><span>结束值</span><span class="v">'+(p.endVal!=null?p.endVal+'%':'-')+'</span></div>'+
    (p.magErr!=null?'<div class="mf"><span>幅度误差</span><span class="v">'+p.magErr+'bp</span></div>':'')+
    (p.rangeHit!=null?'<div class="mf"><span>区间命中</span><span class="v">'+(p.rangeHit?'是':'否')+'</span></div>':'')+
    '<div class="mf"><span>时间窗口</span><span class="v">'+p.horizon+'</span></div>';
  document.getElementById('modal').classList.add('show');
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }

// Framework
function renderFramework() {
  var layers = [
    {t:'宏观基本面',d:'内需弱+外需高景气 → 结构性复苏 · 经济增速波动性小',i:'GDP增速、社融、出口、CPI、PPI'},
    {t:'货币政策取向',d:'OMO 7D 1.40% 为锚 + 利差中枢 50bp → 10Y 中性利率 1.90%',i:'降准降息节奏、MLF、央行国债操作'},
    {t:'资金面与机构行为',d:'存款搬家链条：出口结汇→存款活化→银行配置→利率顶部约束',i:'DR001/DR007、基金久期、配置盘力度'},
    {t:'供给与技术面',d:'政府债发行节奏 + 技术面信号（换手率/股债比价）',i:'超长债供给、30Y换手率、股债性价比'},
    {t:'策略输出',d:'利率区间 + 久期建议 + 品种选择',i:'目标区间1.7-1.9%、哑铃型/均衡型结构'},
  ];
  document.getElementById('frameworkContent').innerHTML = layers.map(function(l,i){
    return '<div class="fw-layer"><div class="fw-label">L'+(i+1)+'</div><div class="fw-content">'+
      '<div class="t">'+l.t+'</div><div class="d">'+l.d+'</div>'+
      '<div class="d" style="color:var(--accent);font-size:11px;margin-top:4px">'+l.i+'</div></div></div>'+
      (i<layers.length-1?'<div class="fw-arrow">↓</div>':'');
  }).join('');
}

// CITIC predictions
function renderCitic() {
  document.getElementById('citicPreds').innerHTML = D.cs.map(function(p){
    var rng = p.rangeLow != null ? ' <span style="color:var(--accent)">['+p.rangeLow+'-'+p.rangeHigh+'%]</span>' : '';
    var clr = p.confidence === 'high' ? 'var(--green)' : p.confidence === 'medium' ? 'var(--orange)' : 'var(--muted)';
    return '<div class="pred-item"><div style="display:flex;justify-content:space-between;align-items:center">'+
      '<span style="font-weight:600">'+p.date+'</span>'+
      '<span class="tag" style="background:'+clr+'22;color:'+clr+'">'+p.confidence+'</span></div>'+
      '<div style="margin-top:4px;font-size:14px">'+p.target+': '+p.direction+rng+'</div>'+
      '<div class="pd">"'+p.rawText+'"</div></div>';
  }).join('');
}

// Export
function exportCSV() {
  var rows = [['机构','标的','时间窗','综合分','方向命中','幅度误差bp','区间命中','起始值%','结束值%']];
  D.pr.forEach(function(p){rows.push([p.inst,p.target,p.horizon,p.score,p.dirHit?'是':'否',p.magErr!=null?p.magErr:'',p.rangeHit?'是':'-',p.startVal!=null?p.startVal:'',p.endVal!=null?p.endVal:'']);});
  downloadCSV(rows,'研报天团_评分.csv');
}
function exportJSON() {
  var blob = new Blob([JSON.stringify(D.pr,null,2)],{type:'application/json'});
  var a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='研报天团_评分.json'; a.click(); URL.revokeObjectURL(a.href);
}
function exportMarketCSV() {
  var rows = [['日期','10Y国债%','30Y国债%','OMO 7D%','CDB 10Y%']];
  D.ts.forEach(function(d){rows.push([d.d,d.t10,d.t30||'',d.omo||'',d.cdb10||'']);});
  downloadCSV(rows,'研报天团_行情.csv');
}
function downloadCSV(rows,name) {
  var csv = rows.map(function(r){return r.map(function(v){return typeof v==='string'&&v.indexOf(',')>=0?'"'+v+'"':v;}).join(',');}).join('\n');
  var blob = new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  var a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); URL.revokeObjectURL(a.href);
}

// Init
renderStats();
renderRank();
renderChart1();
renderChart2();
renderTable();
renderChart3();
renderFramework();
renderCitic();
</script>
</body>
</html>
